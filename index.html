<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <!-- Font Link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./style/app.css" />

    <title>Frontend Mentor | Rock, Paper, Scissors</title>
    <script defer src="./js/app.js" type="module"></script>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <header class="header-app">
      <div class="container">
        <div class="header-app__wraper">
          <div class="header-app__logo">
            <img src="./images/logo.svg" alt="" />
          </div>
          <div class="header-app__score">
            <span>score</span>
            <h2 id="scorePlayer">0</h2>
          </div>
        </div>
      </div>
    </header>
    <main class="body-app">
      <div class="container">
        <div class="body-app__wraper">
          <div class="start-game hidden">
            <div class="start-game__player">
              <div class="start-game__player-title">
                <h3>You picked</h3>
              </div>
              <div class="start-game__player-choise">
                <img src="./images/icon-paper.svg" alt="" />
              </div>
            </div>
            <div class="results-game hidden">
              <div class="results-game__title">
                <h2>You lose</h2>
              </div>
              <div class="results-game__btn">
                <button class="red">Play Again</button>
              </div>
            </div>
            <div class="start-game__bot">
              <div class="start-game__bot-nonactive">
                <div class="start-game__bot-title">
                  <h3>the house picked</h3>
                </div>
                <div class="start-game__bot-choise non-active">
                  <div class="start-game__bot-choise__box"></div>
                </div>
              </div>
              <div class="start-game__bot-active hidden">
                <div class="start-game__bot-title">
                  <h3>the house picked</h3>
                </div>
                <div class="start-game__bot-choise bot">
                  <img src="./images/icon-scissors.svg" alt="" />
                </div>
              </div>
            </div>
          </div>
          <div class="body-app__btn-wraper">
            <div class="body-app__bg-img">
              <img src="./images/bg-triangle.svg" alt="" />
            </div>
            <div class="body-app__btn paper-btn top-left">
              <img src="./images/icon-paper.svg" alt="" />
            </div>
            <div class="body-app__btn rock-btn bottom-center">
              <img src="./images/icon-rock.svg" alt="" />
            </div>
            <div class="body-app__btn scissors-btn top-right">
              <img src="./images/icon-scissors.svg" alt="" />
            </div>
          </div>
          <div class="modale-rule hidden">
            <div class="modale-rule__wraper">
              <div class="modale-rule__header">
                <div class="modale-rule__title">
                  <h3>Rules</h3>
                </div>
                <div class="modale-rule__close-btn">
                  <img src="./images/icon-close.svg" alt="" />
                </div>
              </div>
              <div class="modale-rule__body">
                <img src="./images/image-rules.svg" />
              </div>
            </div>
          </div>
          <div class="background-hide"></div>
        </div>
      </div>
    </main>
    <footer class="footer-app">
      <div class="rules-app">
        <button id="rulesBtn">Rules</button>
      </div>
    </footer>
  </body>
</html>
